name: CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # Router tests (tests/test_frequency_router.py etc.) and ETL tests
    # (tests/test_load_to_db.py, tests/test_load_sentences.py) run real SQL
    # against Postgres -- schema.sql relies on Postgres-only features
    # (ARRAY_AGG, DISTINCT ON, ON CONFLICT) that SQLite can't stand in for.
    # Same DB_USER/DB_PASSWORD/DB_NAME as docker-compose's `db` service and
    # backend/db.py's defaults, so no extra env vars are needed here.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hsk_user
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: hsk_frequency
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        # openai-whisper's legacy setup.py needs pkg_resources at build time, which
        # recent setuptools no longer bundles in a fresh isolated build env. Installing
        # setuptools<81 first, then using --no-build-isolation for the rest, makes
        # that pinned setuptools (already in this environment) the one whisper builds
        # against instead of pip fetching an unconstrained latest into an ephemeral env.
        run: |
          pip install "setuptools<81"
          pip install --no-build-isolation -r requirements/api.txt -r requirements/etl.txt pytest pytest-cov httpx

      - name: Run tests
        run: pytest tests/ --cov=backend --cov=etl --cov-report=xml -v

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security & Quality Scan
    needs: test
    runs-on: ubuntu-latest
    # Same reason as the `test` job: the coverage run below re-executes the
    # DB-backed test suite, so SonarCloud's coverage input needs Postgres too.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hsk_user
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: hsk_frequency
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # SonarCloud needs full history for accurate blame/new-code stats

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install "setuptools<81"
          pip install --no-build-isolation -r requirements/api.txt -r requirements/etl.txt bandit pytest pytest-cov httpx

      - name: Bandit SAST scan
        run: bandit -r backend/ etl/ -f json -o bandit-report.json || true

      - uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: bandit-report.json

      - name: Coverage report (input for SonarCloud)
        run: pytest tests/ --cov=backend --cov=etl --cov-report=xml -v || true

      # Dependabot-triggered runs don't get repo secrets (GitHub restricts this
      # by design, same as fork PRs), so SONAR_TOKEN is empty on those runs --
      # skip rather than hard-fail the whole job over a Dependabot version bump.
      - name: Check SonarCloud token availability
        id: sonar_check
        run: echo "has_token=${{ secrets.SONAR_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: SonarCloud scan
        if: steps.sonar_check.outputs.has_token == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  terraform:
    name: IaC Syntax Check (Vercel + Neon)
    needs: security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

# terraform plan/apply are intentionally NOT run in CI. State is local-only
# (infra/terraform.tfstate, gitignored since it contains DB credentials in
# plaintext -- no remote backend is configured). A CI runner has no access to
# that state, so "plan"/"apply" here would always start from a blank slate and
# try to recreate the Neon/Vercel projects that already exist locally --
# which is exactly what broke the first few master-branch runs (Terraform
# apply failing on "already exists" conflicts). fmt/validate need no state and
# are safe to run on every push; actual plan/apply stays a local, manual
# operation for this solo project. (A shared remote backend -- e.g. Terraform
# Cloud's free tier -- would fix this properly if this ever needs a second
# operator or a CI-driven apply; not needed for now.)
#
# Deploy is intentionally NOT a job here: infra/main.tf's vercel_project resource
# links the Vercel project to this GitHub repo (git_repository block), so Vercel's
# own native integration handles it for free — a preview deployment per PR and a
# production deployment on every push to master, with zero extra CI minutes spent.
#
# Required repo secret (Settings > Secrets and variables > Actions):
#   SONAR_TOKEN — sonarcloud.io > My Account > Security
# (VERCEL_TOKEN/NEON_API_KEY/NEON_ORG_ID are NOT GitHub secrets -- Terraform
# only ever runs locally, from infra/terraform.tfvars. See wiki/devsecops.md.)
#
# GitHub Actions is unlimited/free on a public repo, and SonarCloud's free tier
# also requires the repo to be public.
#
# Dependency vulnerability scanning is handled by Dependabot (.github/dependabot.yml)
# instead of Snyk/Safety — it's a native GitHub feature (free, no token, no signup)
# and it opens the update PRs itself instead of just reporting findings.
