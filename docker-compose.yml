version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-hsk_frequency}
      POSTGRES_USER: ${DB_USER:-hsk_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data

  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile.etl
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./etl:/app/etl
      - ./data:/app/data
    profiles:
      - etl

volumes:
  postgres_data:
